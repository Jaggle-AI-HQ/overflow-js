name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build JS SDKs
    runs-on: [self-hosted, jaggle-dev]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Type check
        run: npm run typecheck -w packages/browser && npm run typecheck -w packages/react && npm run typecheck -w packages/nextjs
