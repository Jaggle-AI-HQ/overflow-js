name: Publish Package

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package to publish
        required: true
        type: choice
        options:
          - browser
          - react
          - nextjs
      bump:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
      preid:
        description: Pre-release identifier (only used when bump is "prerelease")
        required: false
        type: string
        default: beta

concurrency:
  group: publish-${{ github.event.inputs.package }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish @jaggle-ai/overflow-${{ github.event.inputs.package }}
    runs-on: [self-hosted, jaggle-dev]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump version
        id: version
        run: |
          if [ "${{ github.event.inputs.bump }}" = "prerelease" ]; then
            NEW_VERSION=$(npm version prerelease --preid=${{ github.event.inputs.preid }} --no-git-tag-version)
          else
            NEW_VERSION=$(npm version ${{ github.event.inputs.bump }} --no-git-tag-version)
          fi
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
        working-directory: packages/${{ github.event.inputs.package }}

      - name: Build all packages
        run: npm run build

      - name: Typecheck
        run: npm run typecheck -w packages/browser && npm run typecheck -w packages/react && npm run typecheck -w packages/nextjs

      - name: Publish
        run: |
          if [ "${{ github.event.inputs.bump }}" = "prerelease" ]; then
            npm publish --access public --tag ${{ github.event.inputs.preid }}
          else
            npm publish --access public
          fi
        working-directory: packages/${{ github.event.inputs.package }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/${{ github.event.inputs.package }}/package.json
          git commit -m "release: @jaggle-ai/overflow-${{ github.event.inputs.package }}@${{ steps.version.outputs.new_version }}"
          git tag "@jaggle-ai/overflow-${{ github.event.inputs.package }}@${{ steps.version.outputs.new_version }}"
          git push origin HEAD --tags
